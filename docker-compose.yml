services:
  postgres:
    image: postgres:16
    container_name: renting-postgres
    environment:
      POSTGRES_DB: renting
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d renting"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: renting-keycloak
    platform: linux/amd64
    command: start-dev --import-realm --hostname-strict=false --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./docker/keycloak/realm-renting.json:/opt/keycloak/data/import/realm-renting.json:ro

  microservice-host:
    container_name: renting-microservice
    platform: linux/amd64
    build:
      context: .
      dockerfile: src/GtMotive.Estimate.Microservice.Host/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__PostgreSql: Host=postgres;Port=5432;Database=renting;Username=postgres;Password=postgres
      AppSettings__JwtAuthority: http://keycloak:8080/realms/renting
      AppSettings__JwtAuthorityInternal: http://keycloak:8080/realms/renting
      AppSettings__JwtAuthorityPublic: http://localhost:8081/realms/renting
      AppSettings__JwtAudience: estimate-api
      AppSettings__SwaggerClientId: client-gtestimate-swagger
      AppSettings__SwaggerClientSecret: ""
      Swagger__AuthFlow: AuthorizationCode
      Swagger__EnableTryIt: Yes
      PathBase: /
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  postgres-data:
